{{define "base"}}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}} · dld</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1020;
      --panel: #121932;
      --panel-2: #18213f;
      --line: #293558;
      --text: #edf2ff;
      --muted: #aab5d6;
      --accent: #76a9ff;
      --accent-2: #87e3b3;
      --danger: #ff8e8e;
      --warn: #ffd479;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #0a1022, #0d1530 20%, #0b1020 100%);
      color: var(--text);
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .layout { max-width: 1180px; margin: 0 auto; padding: 24px; }
    .header { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 16px; align-items: center; margin-bottom: 24px; }
    .title { margin: 0; font-size: 2rem; }
    .subtitle { color: var(--muted); margin: 6px 0 0; }
    .nav { display: flex; gap: 10px; flex-wrap: wrap; }
    .nav a {
      background: rgba(255,255,255,.04);
      border: 1px solid var(--line);
      padding: 10px 14px;
      border-radius: 999px;
      color: var(--text);
    }
    .nav a.active { background: var(--panel-2); border-color: var(--accent); }
    .grid { display: grid; gap: 18px; }
    .grid.cards { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); }
    .panel {
      background: rgba(18,25,50,.92);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 14px 40px rgba(0,0,0,.25);
    }
    .panel h2, .panel h3 { margin-top: 0; }
    .metric { font-size: 1.9rem; font-weight: 700; margin: 6px 0; }
    .muted { color: var(--muted); }
    .flash, .error {
      padding: 12px 14px; border-radius: 12px; margin-bottom: 16px; border: 1px solid var(--line);
    }
    .flash { background: rgba(135, 227, 179, .12); color: #d4ffe8; border-color: rgba(135, 227, 179, .3); }
    .error { background: rgba(255, 142, 142, .12); color: #ffe0e0; border-color: rgba(255, 142, 142, .3); }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,.07); vertical-align: top; }
    th { color: var(--muted); font-size: .9rem; font-weight: 600; }
    form { display: grid; gap: 12px; }
    .form-row { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
    label { display: grid; gap: 6px; font-size: .95rem; }
    input, select, button {
      width: 100%; border-radius: 12px; border: 1px solid var(--line); background: #0d1430; color: var(--text);
      padding: 11px 12px; font: inherit;
    }
    button { cursor: pointer; background: linear-gradient(180deg, #2b4ea7, #1f3775); }
    button.secondary { background: #162142; }
    button.danger { background: linear-gradient(180deg, #8f3846, #69252f); }
    .pill { display: inline-flex; align-items: center; gap: 6px; border: 1px solid var(--line); border-radius: 999px; padding: 5px 10px; font-size: .84rem; }
    .pill.complete { color: var(--accent-2); }
    .pill.failed { color: var(--danger); }
    .pill.downloading, .pill.starting, .pill.pending { color: var(--warn); }
    .stack { display: grid; gap: 16px; }
    .small { font-size: .88rem; }
    .split { display: grid; gap: 18px; grid-template-columns: 1.15fr .85fr; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    code { background: rgba(255,255,255,.06); padding: 2px 6px; border-radius: 6px; }
    @media (max-width: 900px) { .split { grid-template-columns: 1fr; } .layout { padding: 16px; } }
  </style>
</head>
<body>
  <div class="layout">
    <header class="header">
      <div>
        <h1 class="title">dld web</h1>
        <p class="subtitle">Local-first control panel for targets, downloads, and daemon config.</p>
      </div>
      <nav class="nav">
        <a class="{{if navActive .CurrentPath "/"}}active{{end}}" href="/">Dashboard</a>
        <a class="{{if navActive .CurrentPath "/targets"}}active{{end}}" href="/targets">Targets</a>
        <a class="{{if navActive .CurrentPath "/downloads"}}active{{end}}" href="/downloads">Downloads</a>
        <a class="{{if navActive .CurrentPath "/config"}}active{{end}}" href="/config">Config</a>
      </nav>
    </header>
    {{if .Flash}}<div class="flash">{{.Flash}}</div>{{end}}
    {{if .Error}}<div class="error">{{.Error}}</div>{{end}}
    {{block "content" .}}{{end}}
  </div>
</body>
</html>
{{end}}
